services:
  portal:
    build:
      context: .
      dockerfile: src/WiSave.Portal/Dockerfile
      args:
        GITHUB_PACKAGES_USERNAME: ${GITHUB_PACKAGES_USERNAME:-JacobChwastek}
      secrets:
        - github_packages_token
    ports:
      - "5100:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      rabbitmq:
        condition: service_healthy
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__Portal=Host=postgres;Database=wisave_portal;Username=wisave;Password=wisave_dev
      - Migrations__AutoApplyOnStartup=true
      - Redis__ConnectionString=redis:6379
      - Cors__Origins__0=http://localhost:4200
      - ReverseProxy__Clusters__incomes-cluster__Destinations__destination1__Address=http://wisave-incomes:8080
      - ReverseProxy__Clusters__stocks-cluster__Destinations__destination1__Address=http://wisave-stocks:8080
      - ReverseProxy__Clusters__expenses-cluster__Destinations__destination1__Address=http://wisave-expenses-webapi:8080
      - RabbitMq__Host=rabbitmq
      - RabbitMq__VirtualHost=expenses
      - RabbitMq__Username=guest
      - RabbitMq__Password=guest
    networks:
      - default
      - wisave-net

  postgres:
    image: postgres:17
    ports:
      - "5432:5432"
    volumes:
      - portal-db:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=wisave_portal
      - POSTGRES_USER=wisave
      - POSTGRES_PASSWORD=wisave_dev
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wisave -d wisave_portal"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  rabbitmq:
    image: rabbitmq:4-management-alpine
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      - RABBITMQ_SERVER_ADDITIONAL_ERL_ARGS=-rabbitmq_management load_definitions "/etc/rabbitmq/definitions.json"
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
      - ./infrastructure/rabbitmq/definitions.json:/etc/rabbitmq/definitions.json:ro
    healthcheck:
      test: ["CMD-SHELL", "rabbitmq-diagnostics check_port_connectivity"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - default
      - wisave-net

volumes:
  portal-db:
  rabbitmq-data:

networks:
  default:
  wisave-net:
    external: true
    name: wisave-net

secrets:
  github_packages_token:
    environment: GITHUB_PACKAGES_TOKEN
