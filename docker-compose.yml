services:
  portal:
    build:
      context: .
      dockerfile: src/WiSave.Portal/Dockerfile
    ports:
      - "5100:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__Portal=Host=postgres;Database=wisave_portal;Username=wisave;Password=wisave_dev
      - Migrations__AutoApplyOnStartup=true
      - Redis__ConnectionString=redis:6379
      - Cors__Origins__0=http://localhost:4200
      - ReverseProxy__Clusters__incomes-cluster__Destinations__destination1__Address=http://wisave-incomes:8080
      - ReverseProxy__Clusters__stocks-cluster__Destinations__destination1__Address=http://wisave-stocks:8080

  postgres:
    image: postgres:17
    ports:
      - "5432:5432"
    volumes:
      - portal-db:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=wisave_portal
      - POSTGRES_USER=wisave
      - POSTGRES_PASSWORD=wisave_dev
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wisave -d wisave_portal"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  portal-db:
