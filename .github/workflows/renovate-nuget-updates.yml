name: Renovate NuGet Updates

on:
  push:
    branches:
      - master
  schedule:
    - cron: '17 3 * * *'
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  packages: read
  pull-requests: write

concurrency:
  group: renovate-nuget-updates
  cancel-in-progress: true

jobs:
  renovate:
    name: Check NuGet updates
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24'

      - name: Run Renovate
        env:
          LOG_LEVEL: info
          RENOVATE_CONFIG_FILE: .github/renovate.json
          RENOVATE_ONBOARDING: 'false'
          RENOVATE_PLATFORM: github
          RENOVATE_REPOSITORIES: ${{ github.repository }}
          RENOVATE_TOKEN: ${{ secrets.RENOVATE_TOKEN || secrets.GITHUB_TOKEN }}
          RENOVATE_X_GITHUB_HOST_RULES: 'true'
        run: npx --yes renovate
