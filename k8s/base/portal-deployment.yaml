apiVersion: apps/v1
kind: Deployment
metadata:
  name: portal
  namespace: wisave
  labels:
    app: portal
spec:
  replicas: 2
  selector:
    matchLabels:
      app: portal
  template:
    metadata:
      labels:
        app: portal
    spec:
      containers:
        - name: portal
          image: wisave-portal:latest
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: portal-config
            - secretRef:
                name: portal-secrets
          readinessProbe:
            httpGet:
              path: /api/auth/me
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/auth/me
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 30
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
