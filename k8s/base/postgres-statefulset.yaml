apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: portal-postgres
  namespace: wisave
  labels:
    app: portal-postgres
spec:
  serviceName: portal-postgres
  replicas: 1
  selector:
    matchLabels:
      app: portal-postgres
  template:
    metadata:
      labels:
        app: portal-postgres
    spec:
      containers:
        - name: postgres
          image: postgres:17
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: wisave_portal
            - name: POSTGRES_USER
              value: wisave
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: portal-secrets
                  key: POSTGRES_PASSWORD
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "wisave", "-d", "wisave_portal"]
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 1Gi
  volumeClaimTemplates:
    - metadata:
        name: postgres-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 5Gi
